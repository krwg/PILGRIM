<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="fib" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 4 L4 0" stroke="#b8a990" stroke-width="0.4" opacity="0.35"/>
    </pattern>
    <filter id="stain">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="8"/>
      <feColorMatrix values="0 0 0 0 0.7  0 0 0 0 0.65  0 0 0 0 0.55  0 0 0 0.08 0"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#f0ebe2"/>
  <rect width="200" height="200" fill="url(#fib)"/>
  <rect width="200" height="200" filter="url(#stain)"/>
  <ellipse cx="160" cy="40" rx="50" ry="30" fill="#c8d8e8" opacity="0.12"/>
  <ellipse cx="30" cy="170" rx="40" ry="25" fill="#a89888" opacity="0.08"/>
</svg>
